{% assign collection = include.collection_name %}
<div class="carousel-container" id="carousel-{{ collection }}">
  <div class="carousel-slide" id="slide-{{ collection }}">
    {% for item in site.data.galleries[collection] %}
      <div class="art-piece">
        <img src="{{ item.image | relative_url }}" alt="{{ item.title }}">
        {% if item.title %}
          <div class="art-caption">{{ item.title }}</div>
        {% endif %}
      </div>
    {% endfor %}
  </div>
  <button class="prev" onclick="moveCarousel('{{ collection }}', -1)">❮</button>
  <button class="next" onclick="moveCarousel('{{ collection }}', 1)">❯</button>
</div>

<script>
  if (typeof carouselIndices === 'undefined') { window.carouselIndices = {}; }
  window.carouselIndices['{{ collection }}'] = 0;

  function moveCarousel(id, step) {
    const slide = document.getElementById('slide-' + id);
    const items = slide.getElementsByClassName('art-piece');
    let current = window.carouselIndices[id] + step;

    if (current >= items.length) current = 0;
    if (current < 0) current = items.length - 1;

    window.carouselIndices[id] = current;
    slide.style.transform = `translateX(${-100 * current}%)`;
  }
</script>
