c1:
  title: "Artist Statement: Collection One"
  text: "This series explores the intersection of digital light and physical texture. Each piece was created during the winter of 2024, reflecting the stark contrast of Warsaw's skyline."

c2:
  title: "Artist Statement: Collection Two"
  text: "In this collection, I focused on minimalism and the concept of 'void'. These untitled pieces are meant to evoke a sense of quiet observation."