---
layout: default
---
{% assign gallery_images = site.data.galleries[page.gallery_id] %}

<div class="carousel-overlay" id="galleryOverlay">
  <div class="carousel-container">
    
   <button class="close-gallery" id="closeBtn" aria-label="Close Gallery">&otimes;</button>
    
    <div class="carousel-slide" id="carouselSlide">
      <div class="art-item statement-slide">
        <div class="statement-card">
          <p>{{ site.data.statements[page.gallery_id].text }}</p> 
        </div>
      </div>
      {% for img in gallery_images %}
        <div class="art-item">
          <img src="{{ img.image | relative_url }}" alt="{{ img.title }}">
          <div class="art-caption">{{ img.title }}</div>
        </div>
      {% endfor %}
    </div>
    <div id="image-counter">1 / {{ gallery_images.size | plus: 1 }}</div>
    <button class="carousel-prev" id="prevBtn" aria-label="Backward">←</button>
    <button class="carousel-next start-hint" id="nextBtn" aria-label="Forward">→</button>
  </div> 
</div> 

<script>
  const slide = document.getElementById('carouselSlide');
  const nextBtn = document.getElementById('nextBtn');
  const prevBtn = document.getElementById('prevBtn');
  const counterDisplay = document.getElementById('image-counter');
  const items = document.querySelectorAll('.art-item');
  const closeBtn = document.getElementById('closeBtn');

  let counter = 0;
  const total = items.length;

  // --- SWIPE LOGIC VARIABLES ---
  let touchStartX = 0;
  let touchEndX = 0;

  function updateSlide() {
    slide.style.transform = `translateX(${-100 * counter}%)`;
    if (counterDisplay) {
      counterDisplay.innerText = `${counter + 1} / ${total}`;
    }
    if (counter > 0) {
      nextBtn.classList.remove('start-hint');
    } else {
      nextBtn.classList.add('start-hint');
    }
  }

  // Navigation Logic
  const handleNext = () => {
    counter = (counter >= total - 1) ? 0 : counter + 1;
    updateSlide();
  };

  const handlePrev = () => {
    counter = (counter <= 0) ? total - 1 : counter - 1;
    updateSlide();
  };

  nextBtn.addEventListener('click', handleNext);
  prevBtn.addEventListener('click', handlePrev);

  // --- TOUCH EVENTS FOR SWIPING ---
  slide.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive: true});

  slide.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleGesture();
  }, {passive: true});

  function handleGesture() {
    if (touchStartX - touchEndX > 50) handleNext(); // Swiped Left
    if (touchEndX - touchStartX > 50) handlePrev(); // Swiped Right
  }

  // Close Logic
  closeBtn.addEventListener('click', () => {
    // This tells the browser to go back exactly one step to whatever page the user was just looking at
    window.history.back();
  });

  // Keyboards
  document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowLeft") handlePrev();
    if (e.key === "ArrowRight") handleNext();
    if (e.key === "Escape") closeBtn.click();
  });
</script>
