# Site Settings
title: Simorq-Home
description: "Personal website of Rahman Mohammadpour"
author:
  name: Rahman Mohammadpour
  email: cimurq@pm.me
affiliation: "Institute of Mathematics of Polish Academy of Sciences"

# URL Settings
url: "https://si-morgh.github.io"
baseurl: "" 
permalink: /:categories/:title/

# Build Settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  # NOTE: jekyll-scholar will only work on GitHub if using GitHub Actions
  - jekyll-scholar

# Collections (Optional: If you want to use art/collections as a formal Jekyll collection)
# collections:
#   art_collections:
#     output: true
#     directory: art/collections

# Scholar Configuration
scholar:
  style: apa
  locale: en
  bibliography: "bibliography.bib"
  bibliography_list_tag: ul
  sort_by: year
  order: ascending
  bibliography_template: bib

# Files to include in the build
include:
  - _static

# Navigation (Minima theme uses this for the header)[cite: 1]
header_pages:
  - math/index.md
  - math/publication.md
  - math/notes.md
  - math/slides.md
  - art/index.md
  - art/work.md

# Custom Data for your Layouts[cite: 1]
art_pages:
  - title: "Collections"
    url: "/art/work/"      # Added trailing slashes for better compatibility
  - title: "Posters"
    url: "/art/posters/"
  - title: "Conference Doodling"
    url: "/art/doodling/"

minima:
  skin: classic