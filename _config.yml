# Site Settings
title: Simorq-Home
description: "Personal website of Rahman Mohammadpour"
author:
  name: Rahman Mohammadpour
  email: cimurq@pm.me
affiliation: "Institute of Mathematics of Polish Academy of Sciences"

# URL Settings
url: "https://si-morgh.github.io"
baseurl: "" 
permalink: /:categories/:title/

# Build Settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-scholar

# Scholar Configuration
scholar:
  style: apa
  locale: en
  bibliography: "bibliography.bib"
  bibliography_list_tag: ul
  sort_by: year
  order: ascending
  bibliography_template: bib

include:
  - _static
  - assets

# Navigation
header_pages:
  - math/math-index.md
  - math/publication.md
  - math/notes.md
  - math/slides.md

# Art Menu Data
art_pages:
  - title: "Collections"
    url: "/art/work/"      
  - title: "Posters"
    url: "/art/posters/"
  - title: "Conference Doodling"
    url: "/art/doodling/"