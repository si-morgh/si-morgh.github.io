title: Simorq-Home
author: 
 name: Rahman Mohammadpour
 email:  cimurq@pm.me

affiliation: Institute of Mathematics of Polish Academy of Sciences

description: >
# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-scholar

scholar:
  style: apa  # Change this to another style if needed
  locale: en
  bibliography: "bibliography.bib" # Make sure this file exists in your Jekyll root
  bibliography_list_tag: ul  # To use <ul> instead of default <ol>
  sort_by: year
  order: ascending
  bibliography_template: bib

include:
  - _static


# This is your default menu (Math)
header_pages:
  - Math/finsidsat.md
  - Math/publication.md
  - Math/notes.md
  - Math/slides.md

# This is your Art menu
art_pages:
  - title: "Collections"
    url: "/Art/collections"
  - title: "Posters"
    url: "/Art/posters"
  - title: "Conference Doodling"
    url: "/Art/doodling"

permalink: /:categories/:title/

minima:
  skin: classic
url: "https://si-morgh.github.io"

