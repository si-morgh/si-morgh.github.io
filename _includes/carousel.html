{% assign collection = include.collection_name %}
<div class="carousel-container" id="carousel-{{ collection }}">
  <div class="carousel-slide">
    {% for item in site.data.galleries[collection] %}
      <div class="art-piece">
        <img src="{{ item.image | relative_url }}" alt="{{ item.title }}">
        {% if item.title %}
          <div class="art-caption">{{ item.title }}</div>
        {% endif %}
      </div>
    {% endfor %}
  </div>
  <button class="prev" onclick="moveSlide('{{ collection }}', -1)" aria-label="Previous">❮</button>
  <button class="next" onclick="moveSlide('{{ collection }}', 1)" aria-label="Next">❯</button>
</div>
