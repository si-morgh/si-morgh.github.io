# Site Settings
title: Simorq-Home
description: "Personal website of Rahman Mohammadpour"
author:
  name: Rahman Mohammadpour
  email: cimurq@pm.me
affiliation: "Institute of Mathematics of Polish Academy of Sciences"

# URL Settings
# Use the full URL for production; ensure baseurl is empty for your setup
url: "https://si-morgh.github.io"
baseurl: "" 
permalink: /:categories/:title/

# Build Settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-scholar

# Scholar Configuration
scholar:
  style: apa
  locale: en
  bibliography: "bibliography.bib"
  bibliography_list_tag: ul
  sort_by: year
  order: ascending
  bibliography_template: bib

# Ensure the _static folder and other necessary assets are included
include:
  - _static
  - assets

# Navigation: This controls the automatic menu in the Minima header
header_pages:
  - math/index.md
  - math/publication.md
  - math/notes.md
  - math/slides.md
  - art/index.md
  - art/work.md

# Art Menu Data: Used for custom sidebars or footers[cite: 1]
# Added trailing slashes to prevent 404s on strict servers
art_pages:
  - title: "Collections"
    url: "/art/work/"      
  - title: "Posters"
    url: "/art/posters/"
  - title: "Conference Doodling"
    url: "/art/doodling/"

minima:
  skin: classic