description: >
# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-scholar

scholar:
  style: apa  # Change this to another style if needed
  locale: en
  bibliography: "bibliography.bib" # Make sure this file exists in your Jekyll root
  bibliography_list_tag: ul  # To use <ul> instead of default <ol>
  sort_by: year
  order: ascending
  bibliography_template: bib

include:
  - _static


header_pages:
#  - index.md
  - Math/finsidsat.md
  - Math/publication.md
  - Math/notes.md
  - Math/slides.md


minima:
  skin: classic
url: "https://si-morgh.github.io"

